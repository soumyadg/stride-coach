<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="strideGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a45"/>
      <stop offset="1" stop-color="#ff4d6b"/>
    </linearGradient>
  </defs>
  <!-- dynamic running figure, mid-stride, leaning forward -->
  <g fill="none" stroke="url(#strideGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M58 33 L45 55"/>                <!-- torso -->
    <path d="M57 35 L70 39 L73 30"/>         <!-- front arm (forward, bent up) -->
    <path d="M57 35 L45 44 L36 39"/>         <!-- back arm (behind, bent up) -->
    <path d="M45 55 L61 57 L57 74"/>         <!-- front leg (knee up, shin down) -->
    <path d="M45 55 L33 66 L20 79"/>         <!-- back leg (extended, toe-off) -->
  </g>
  <circle cx="63" cy="24" r="9" fill="url(#strideGrad)"/>
</svg>
